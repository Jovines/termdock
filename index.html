    <style>
      :root {
        background: #1C1B1A;
        color-scheme: dark light;
      }

      html,
      body,
      #root {
        margin: 0;
        width: 100%;
        height: 100%;
        min-height: 100vh;
        background: #1C1B1A;
        color: #CECDC3;
      }

      html[data-theme='light'],
      html[data-theme='light'] body,
      html[data-theme='light'] #root {
        background: #FFFCF0;
        color: #100F0F;
      }

      html[data-theme='light'] {
        color-scheme: light;
      }

      .termdock-boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        min-height: 240px;
        padding: 24px;
        box-sizing: border-box;
        background: #1C1B1A;
        color: #878580;
        font: 14px/1.4 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      .termdock-boot-spinner {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(206, 205, 195, 0.18);
        border-top-color: #879A39;
        border-radius: 9999px;
        animation: termdock-boot-spin 0.9s linear infinite;
      }

      .termdock-boot-error {
        max-width: 28rem;
        text-align: center;
      }

      @keyframes termdock-boot-spin {
        to { transform: rotate(360deg); }
      }

    </style>
    <link rel="stylesheet" href="/src/index.css" />
    <title>Termdock</title>
    
    <!-- Preload the unified terminal font pack. First paint may wait for these,
         but PWA/cache hits keep later launches and new sessions stable. -->
    <link rel="preload" href="/fonts/JetBrainsMonoNLNerdFontMono-Regular.ttf" as="font" type="font/ttf" crossorigin="anonymous">
    <link rel="preload" href="/fonts/JetBrainsMonoNLNerdFontMono-Bold.ttf" as="font" type="font/ttf" crossorigin="anonymous">
    <link rel="preload" href="/fonts/TermdockStarSymbol-Subset.woff2" as="font" type="font/woff2" crossorigin="anonymous">

    <!-- Self-hosted terminal fonts.
         统一原则：每个 @font-face 都用 unicode-range 限定字符集，浏览器只在
         实际渲染到该区间时才下载，做到 "全字符覆盖 + 不浪费带宽"。
         所有引用（Tailwind / 业务组件 / xterm）都通过 :root 上的 --font-mono
         CSS 变量读取，单一来源见 src/index.css。 -->
    <style>
      /* JetBrains Mono NL Nerd Font Mono —— 终端主字体，保持 JetBrains
         Mono NL 的无连字风格，同时内置 Nerd Font / Powerline / devicons。
         使用 Mono 版本保证图标按终端 cell 设计；首屏强等字体，避免从
         fallback/tofu 跳到完整图标。 */
      @font-face {
        font-family: 'Termdock Mono';
        src: url('/fonts/JetBrainsMonoNLNerdFontMono-Regular.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
        font-display: block;
      }
      @font-face {
        font-family: 'Termdock Mono';
        src: url('/fonts/JetBrainsMonoNLNerdFontMono-Bold.ttf') format('truetype');
        font-weight: 700;
        font-style: normal;
        font-display: block;
      }
      @font-face {
        font-family: 'Termdock Mono';
        src: url('/fonts/JetBrainsMonoNLNerdFontMono-Italic.ttf') format('truetype');
        font-weight: 400;
        font-style: italic;
        font-display: block;
      }
      @font-face {
        font-family: 'Termdock Mono';
        src: url('/fonts/JetBrainsMonoNLNerdFontMono-BoldItalic.ttf') format('truetype');
        font-weight: 700;
        font-style: italic;
        font-display: block;
      }
      /* Termdock Star Symbol —— 从 Menlo Regular 抽取 U+2726/U+2727
         (✦/✧) 的子集。Menlo 是 macOS 上这两个符号与等宽文本视觉大小
         最接近的系统字形，避免手机端走系统符号 fallback 后偏大。

         新增类似“桌面正常、手机偏大/偏小”的自维护符号时：
         1. 先确认本机实际看起来正常的等宽字形来源，优先检查 Menlo：
            fc-list ':charset=<hex>' file family style
            fc-match -v 'Menlo:style=Regular:charset=<hex>'
         2. 不要只信默认 fc-match。它可能返回 Arial Unicode MS，但 Chrome/
            Safari 的 CoreText fallback 不一定等同于 fontconfig 默认结果。
         3. 优先从 Menlo Regular 追加抽取字符到这份子集，并扩展下面的
            unicode-range；避免用 size-adjust 硬调，否则不同设备又会偏大/偏小。
         4. 同步更新 src/index.css 的字体链说明，以及 TerminalViewport.tsx 里的
            TERMINAL_FONT_PRELOADS 文本，确保首帧不会先走系统 fallback。 */
      @font-face {
        font-family: 'Termdock Star Symbol';
        src: url('/fonts/TermdockStarSymbol-Subset.woff2') format('woff2');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
        unicode-range: U+2726, U+2727;
      }
      /* Noto Sans Symbols 2 —— 只补足 JetBrains Mono / Nerd Font 都未收录且
         容易被 emoji / 系统符号字体抢走的少数字符：⏸⏹⏺ / ✓✗。
         不覆盖整段 Dingbats，否则 ❖ 等装饰符号会命中 Noto 的大号字形，
         在终端 cell 里显得过大。 */
      @font-face {
        font-family: 'Noto Sans Symbols 2';
        src: url('/fonts/NotoSansSymbols2-Subset.woff2') format('woff2');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
        unicode-range: U+23F8-23FA, U+2713, U+2717;
      }
      /* Noto Sans Mono CJK SC —— 自托管的等宽中日韩字体子集（GB2312 一级
         常用字 + 中文标点 + 全角区），用于在终端 / UI 中正确渲染 CJK，
         不依赖系统字体可用性。CJK 区由 unicode-range 守住，不会接管拉丁字。
         U+3400-4DBF (CJK Ext A) 和 U+FE30-FE4F (CJK Compat Forms) 在子集
         里为空，不声明，避免无谓的字体回退查找。
         Regular + Bold 两种变体自托管，替代 xterm 合成 bold CJK。 */
      @font-face {
        font-family: 'Noto Sans Mono CJK SC';
        src: url('/fonts/NotoSansMonoCJKsc-Subset.woff2') format('woff2');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
        unicode-range: U+3000-303F, U+4E00-9FFF, U+FF00-FFEF;
      }
      @font-face {
        font-family: 'Noto Sans Mono CJK SC';
        src: url('/fonts/NotoSansMonoCJKsc-Bold-Subset.woff2') format('woff2');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
        unicode-range: U+3000-303F, U+4E00-9FFF, U+FF00-FFEF;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="termdock-boot">
        <div class="termdock-boot-spinner" aria-hidden="true"></div>
        <span>Loading Termdock</span>
      </div>
    </div>
    <script>
      function showTermdockBootError(event) {
        var root = document.getElementById('root');
        if (!root || root.children.length !== 1 || !root.querySelector('.termdock-boot')) return;
        var message = event && event.message ? event.message : 'Termdock failed to start.';
        if (!event.message && event.reason) {
          message = event.reason && event.reason.message ? event.reason.message : String(event.reason);
        }
        root.textContent = '';
        var errorBox = document.createElement('div');
        errorBox.className = 'termdock-boot termdock-boot-error';
        var text = document.createElement('span');
        text.textContent = message;
        errorBox.appendChild(text);
        root.appendChild(errorBox);
      }
      window.addEventListener('error', showTermdockBootError, true);
      window.addEventListener('unhandledrejection', showTermdockBootError);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
